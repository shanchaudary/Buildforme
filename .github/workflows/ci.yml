name: Buildforme CI

on:
  pull_request:
  push:
    branches:
      - main
      - founder-control-plane-mvp

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run policy smoke check
        run: python -m buildforme.cli classify data/sample_task.json

  remediate-stage6-redteam-round2:
    if: github.event_name == 'pull_request' && github.head_ref == 'stage-6-multi-provider-supervised-execution'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Stage 6 branch
        uses: actions/checkout@v4
        with:
          ref: stage-6-multi-provider-supervised-execution
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fail-closed red-team gate
        run: bash scripts/run_stage6_redteam_round2.sh
