name: Packet 5A Scoped Remediation

on:
  push:
    branches:
      - stage-6-multi-provider-supervised-execution
    paths:
      - .github/workflows/packet5a-remediation.yml

permissions:
  contents: write

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v4
        with:
          ref: stage-6-multi-provider-supervised-execution
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply scoped Packet 5A hardening
        run: python scripts/apply_packet5a_hardening.py

      - name: Check syntax and patch cleanliness
        run: |
          python -m py_compile buildforme/execution_store.py buildforme/execution_service.py tests/test_run_mutation_authority_hardening.py
          git diff --check

      - name: Run focused mutation authority tests
        run: python -m unittest discover -s tests -p 'test_run_mutation_authority*.py' -v

      - name: Run full test suite
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run policy smoke check
        run: python -m buildforme.cli classify data/sample_task.json

      - name: Run Constitution validation
        run: |
          python - <<'PY'
          from governance.constitution_engine import get_engine
          result = get_engine().full_validation_suite()
          print(result)
          if not result.get("passed"):
              raise SystemExit(1)
          PY

      - name: Remove temporary remediation machinery
        run: |
          rm scripts/apply_packet5a_hardening.py
          rm .github/workflows/packet5a-remediation.yml
          git diff --check

      - name: Commit verified remediation
        run: |
          git config user.name "Buildforme Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add buildforme/execution_store.py buildforme/execution_service.py tests/test_run_mutation_authority_hardening.py scripts/apply_packet5a_hardening.py .github/workflows/packet5a-remediation.yml
          git status --short
          git commit -m "Harden run mutation authority and lifecycle truth"
          git push origin HEAD:stage-6-multi-provider-supervised-execution
