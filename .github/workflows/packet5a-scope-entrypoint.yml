name: Packet 5A Scope Entrypoint Guard

on:
  push:
    branches:
      - stage-6-multi-provider-supervised-execution
    paths:
      - .github/workflows/packet5a-scope-entrypoint.yml

permissions:
  contents: write

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v4
        with:
          ref: stage-6-multi-provider-supervised-execution
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply, validate, and publish only verified code
        shell: bash
        run: |
          set +e
          report=packet5a_scope_entrypoint_validation.txt
          : > "$report"

          echo '== apply ==' | tee -a "$report"
          python scripts/apply_packet5a_scope_entrypoint_guard.py 2>&1 | tee -a "$report"
          apply_status=${PIPESTATUS[0]}

          syntax_status=99
          focused_status=99
          full_status=99
          policy_status=99
          constitution_status=99

          if [ "$apply_status" -eq 0 ]; then
            echo '== syntax and diff ==' | tee -a "$report"
            python -m py_compile buildforme/execution_service.py tests/test_run_mutation_authority_hardening.py 2>&1 | tee -a "$report"
            syntax_status=${PIPESTATUS[0]}
            if [ "$syntax_status" -eq 0 ]; then
              git diff --check 2>&1 | tee -a "$report"
              syntax_status=${PIPESTATUS[0]}
            fi

            echo '== focused tests ==' | tee -a "$report"
            python -m unittest discover -s tests -p 'test_packet5a_mutation_policy_contract.py' -v 2>&1 | tee -a "$report"
            contract_status=${PIPESTATUS[0]}
            python -m unittest discover -s tests -p 'test_run_mutation_authority*.py' -v 2>&1 | tee -a "$report"
            authority_status=${PIPESTATUS[0]}
            if [ "$contract_status" -eq 0 ] && [ "$authority_status" -eq 0 ]; then
              focused_status=0
            else
              focused_status=1
            fi

            echo '== full suite ==' | tee -a "$report"
            python -m unittest discover -s tests -p 'test_*.py' 2>&1 | tee -a "$report"
            full_status=${PIPESTATUS[0]}

            echo '== policy smoke ==' | tee -a "$report"
            python -m buildforme.cli classify data/sample_task.json 2>&1 | tee -a "$report"
            policy_status=${PIPESTATUS[0]}

            echo '== constitution ==' | tee -a "$report"
            python - <<'PY' 2>&1 | tee -a "$report"
          from governance.constitution_engine import get_engine
          result = get_engine().full_validation_suite()
          print(result)
          if not result.get("passed"):
              raise SystemExit(1)
          PY
            constitution_status=${PIPESTATUS[0]}
          fi

          echo "statuses apply=$apply_status syntax=$syntax_status focused=$focused_status full=$full_status policy=$policy_status constitution=$constitution_status" | tee -a "$report"

          git config user.name "Buildforme Governance Bot"
          git config user.email "actions@users.noreply.github.com"

          if [ "$apply_status" -eq 0 ] && [ "$syntax_status" -eq 0 ] && [ "$focused_status" -eq 0 ] && [ "$full_status" -eq 0 ] && [ "$policy_status" -eq 0 ] && [ "$constitution_status" -eq 0 ]; then
            rm -f "$report"
            rm scripts/apply_packet5a_scope_entrypoint_guard.py
            rm .github/workflows/packet5a-scope-entrypoint.yml
            git diff --check
            git add buildforme/execution_service.py tests/test_run_mutation_authority_hardening.py scripts/apply_packet5a_scope_entrypoint_guard.py .github/workflows/packet5a-scope-entrypoint.yml packet5a_scope_entrypoint_validation.txt
            git commit -m "Enforce bound scope at approval and live execution"
            git push origin HEAD:stage-6-multi-provider-supervised-execution
            exit 0
          fi

          git restore buildforme/execution_service.py tests/test_run_mutation_authority_hardening.py
          git add "$report"
          git commit -m "Record Packet 5A scope-entrypoint validation failure"
          git push origin HEAD:stage-6-multi-provider-supervised-execution
          exit 1
