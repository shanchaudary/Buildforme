name: Buildforme CI

on:
  pull_request:
  push:
    branches:
      - main
      - founder-control-plane-mvp

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run policy smoke check
        run: python -m buildforme.cli classify data/sample_task.json

  remediate-stage7-packet7c:
    if: github.event_name == 'pull_request' && github.head_ref == 'stage-7-independent-multi-agent-review-loop'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout Stage 7 branch
        uses: actions/checkout@v4
        with:
          ref: stage-7-independent-multi-agent-review-loop
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fail-closed Packet 7C gate
        run: bash scripts/run_stage7_packet7c_gate.sh
